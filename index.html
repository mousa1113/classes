<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="جدولنا">
    
    <title>Smart Schedule Pro</title>

    <link rel="icon" href="https://i.ibb.co/Lz0Ym4N/images.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Lz0Ym4N/images.jpg">

    <style>
        :root {
            --bg: #0b0e14;
            --glass: rgba(255, 255, 255, 0.05);
            --green: #00ff88;
            --red: #ff3e3e;
            --malak-grad: linear-gradient(135deg, #ff0080, #ff8c00);
            --mohammed-grad: linear-gradient(135deg, #007cf0, #00dfd8);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg); color: white; margin: 0; padding: 15px;
            min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }
        .header-card {
            background: var(--glass); padding: 20px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;
        }
        #clock { color: var(--green); font-family: monospace; font-size: 1.8rem; font-weight: bold; }

        .tabs-container { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--glass); color: #555; font-weight: bold; }
        .tab-btn.active-malak { background: var(--malak-grad); color: white; }
        .tab-btn.active-mohammed { background: var(--mohammed-grad); color: white; }

        .lesson-card {
            background: var(--glass); border-radius: 15px; padding: 15px;
            margin-bottom: 10px; display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lesson-card.live { border-color: var(--green); background: rgba(0, 255, 136, 0.05); }
        .item-lamp { width: 10px; height: 10px; border-radius: 50%; background: var(--red); margin-left: 12px; }
        .live .item-lamp { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .bottom-nav { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; gap: 15px; }
        .nav-btn { width: 60px; height: 60px; border-radius: 18px; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; backdrop-filter: blur(10px); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .content-box { width: 100%; max-width: 400px; background: #161b22; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .btn-save { background: var(--green); color: black; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-card">
        <h2 id="userNameDisplay" style="margin:0;">جدول ملك</h2>
        <div id="clock">00:00:00 ص</div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active-malak" id="tabMalak" onclick="switchUser('malak')">ملك</button>
        <button class="tab-btn" id="tabMohammed" onclick="switchUser('mohammed')">محمد</button>
    </div>

    <div id="scheduleBody" style="padding-bottom: 120px;"></div>

    <div class="bottom-nav">
        <button class="nav-btn" onclick="openSettings()">⚙️</button>
        <button class="nav-btn" style="background: var(--green); color:black;" onclick="calculateFreeTime()">☕</button>
    </div>

    <div id="settingsOverlay" class="overlay">
        <div class="content-box" id="passwordStage">
            <h3 style="text-align: center;">رمز الدخول</h3>
            <input type="password" id="passInput" placeholder="0512" style="width:100%; padding:12px; margin:10px 0; background:#000; color:#fff; border:1px solid #333; border-radius:8px; text-align:center;">
            <button class="btn-save" onclick="verifyPass()">فتح التعديل</button>
            <button onclick="closeOverlay()" style="background:none; border:none; color:white; width:100%; margin-top:15px;">إلغاء</button>
        </div>
        <div class="content-box" id="editStage" style="display: none;">
            <h3 style="color:var(--green); text-align:center;">إضافة مادة جديدة</h3>
            <p style="font-size: 0.8rem; color: #888; text-align: center;">(الميزة قيد التحديث في النسخة المستقرة)</p>
            <button onclick="logoutSettings()" class="btn-save" style="background:#555; color:#fff;">إغلاق</button>
        </div>
    </div>

    <script>
        const db = {
            malak: [
                { name: "رياضة", day: "السبت", start: 14, end: 16 }, { name: "ألماني", day: "السبت", start: 16, end: 18 }, { name: "كيمياء", day: "السبت", start: 20.5, end: 22.5 },
                { name: "تاريخ", day: "الأحد", start: 16, end: 18 }, { name: "عربي", day: "الأحد", start: 19, end: 21 }, { name: "كورس", day: "الأحد", start: 23, end: 25 },
                { name: "فيزياء", day: "الإثنين", start: 14, end: 16 }, { name: "إنجليزي", day: "الإثنين", start: 16, end: 18 },
                { name: "رياضة", day: "الثلاثاء", start: 14, end: 16 }, { name: "ألماني", day: "الثلاثاء", start: 16, end: 18 }, { name: "كيمياء", day: "الثلاثاء", start: 20.5, end: 22.5 },
                { name: "تاريخ", day: "الأربعاء", start: 16, end: 18 }, { name: "عربي", day: "الأربعاء", start: 19, end: 21 },
                { name: "فيزياء", day: "الخميس", start: 14, end: 16 }, { name: "إنجليزي", day: "الخميس", start: 16, end: 18 }
            ],
            mohammed: [
                { name: "رياضة", day: "السبت", start: 10.5, end: 13 }, { name: "كيمياء", day: "السبت", start: 13, end: 15 }, { name: "ألماني", day: "السبت", start: 16, end: 18 },
                { name: "فيزياء", day: "الأحد", start: 16, end: 18 }, { name: "عربي", day: "الأحد", start: 19, end: 21 },
                { name: "رياضة", day: "الإثنين", start: 9, end: 11 }, { name: "إنجليزي", day: "الإثنين", start: 13, end: 15 }
            ]
        };

        let currentUser = 'malak';

        function updateClock() {
            const now = new Date();
            let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
            let p = h >= 12 ? 'م' : 'ص';
            h = h % 12 || 12;
            document.getElementById('clock').innerText = `${h}:${m}:${s} ${p}`;
            renderStatus(now);
        }

        function render() {
            let html = '';
            ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"].forEach(day => {
                const lessons = db[currentUser].filter(l => l.day === day).sort((a,b) => a.start - b.start);
                if(lessons.length > 0) {
                    html += `<div style="margin:20px 5px 10px; color:#555; font-size:0.8rem; font-weight:bold;">● ${day}</div>`;
                    lessons.forEach(l => {
                        html += `<div class="lesson-card" id="l-${l.name}-${l.day}">
                                    <div class="item-lamp"></div>
                                    <div style="flex-grow: 1;">
                                        <div style="font-weight: bold;">${l.name}</div>
                                        <div style="color: #666; font-size: 0.8rem;">${fmt(l.start)} - ${fmt(l.end)}</div>
                                    </div>
                                </div>`;
                    });
                }
            });
            document.getElementById('scheduleBody').innerHTML = html;
        }

        function renderStatus(now) {
            const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const today = days[now.getDay()];
            const hour = now.getHours() + (now.getMinutes()/60);
            db[currentUser].forEach(l => {
                const el = document.getElementById(`l-${l.name}-${l.day}`);
                if(el) {
                    let isLive = (l.day === today && hour >= l.start && hour < l.end);
                    if(isLive) el.classList.add('live'); else el.classList.remove('live');
                }
            });
        }

        // حساب وقت الفراغ
        function calculateFreeTime() {
            const now = new Date();
            const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const todayLessons = db[currentUser].filter(l => l.day === days[now.getDay()]).sort((a,b) => a.start - b.start);
            const hour = now.getHours() + (now.getMinutes()/60);
            
            let next = todayLessons.find(l => l.start > hour);
            if(next) {
                let diff = (next.start - hour) * 60;
                alert(`فاضل لك ${Math.floor(diff)} دقيقة على درس ${next.name}.. استمتع بالبريك! ☕`);
            } else {
                alert("خلصت دروسك النهاردة.. يومك سعيد! ✨");
            }
        }

        function fmt(t) { let h = Math.floor(t), m = (t % 1) !== 0 ? "30" : "00", p = h >= 12 ? "م" : "ص", dh = h % 12 || 12; return `${dh}:${m}${p}`; }
        function switchUser(u) { currentUser = u; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-malak','active-mohammed')); document.getElementById(u==='malak'?'tabMalak':'tabMohammed').classList.add(u==='malak'?'active-malak':'active-mohammed'); document.getElementById('userNameDisplay').innerText = "جدول "+(u==='malak'?'ملك':'محمد'); render(); }
        function openSettings() { document.getElementById('settingsOverlay').style.display='flex'; }
        function closeOverlay() { document.getElementById('settingsOverlay').style.display='none'; }
        function verifyPass() { if(document.getElementById('passInput').value === "0512") { document.getElementById('passwordStage').style.display='none'; document.getElementById('editStage').style.display='block'; } }
        function logoutSettings() { document.getElementById('passwordStage').style.display='block'; document.getElementById('editStage').style.display='none'; closeOverlay(); }

        setInterval(updateClock, 1000);
        render();
    </script>
</body>
</html>
