<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link rel="icon" type="image/jpg" href="https://i.ibb.co/Lz0Ym4N/images.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Lz0Ym4N/images.jpg">

    <link rel="manifest" href='data:application/manifest+json,{"name":"Elite Schedule","short_name":"Elite","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#000000","icons":[{"src":"https://i.ibb.co/Lz0Ym4N/images.jpg","sizes":"192x192","type":"image/jpg"}]}'>

    <title>Elite Schedule</title>
    <style>
        :root { --malak: #ff007a; --mohammed: #0088ff; --green: #00ff88; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; font-family: sans-serif; background: #000; color: white; transition: 0.5s; padding-bottom: 100px; }
        body.malak-theme { --primary: var(--malak); --bg: #1a000d; }
        body.mohammed-theme { --primary: var(--mohammed); --bg: #000d1a; }
        
        .header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, var(--bg), #000); }
        #clock { font-size: 3rem; font-family: monospace; text-shadow: 0 0 15px var(--primary); }

        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .tab { padding: 10px 30px; border-radius: 20px; border: none; background: var(--glass); color: white; font-weight: bold; }
        .tab.active { background: var(--primary); box-shadow: 0 0 15px var(--primary); }

        .container { padding: 0 20px; }
        .day-label { color: var(--primary); margin: 20px 0 10px; font-weight: bold; border-right: 3px solid var(--primary); padding-right: 10px; }
        
        .card { background: var(--glass); margin-bottom: 10px; padding: 15px; border-radius: 15px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .card.live { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .lamp { width: 10px; height: 10px; border-radius: 50%; margin-left: 15px; background: #333; }
        .card.live .lamp { background: var(--green); box-shadow: 0 0 10px var(--green); animation: p 1.5s infinite; }
        
        /* وقت الفراغ */
        .free-slot { background: rgba(255,255,255,0.03); margin: 5px 20px; padding: 8px; border-radius: 10px; font-size: 0.8rem; color: #777; display: flex; align-items: center; gap: 5px; border-right: 2px solid var(--green); }

        .info b { display: block; font-size: 1.1rem; }
        .info span { font-size: 0.85rem; color: #aaa; }

        .dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15,15,15,0.9); padding: 15px 40px; border-radius: 40px; display: flex; gap: 40px; border: 1px solid var(--glass); backdrop-filter: blur(10px); }
        
        @keyframes p { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="malak-theme">

    <div class="header"><div id="clock">00:00:00 AM</div></div>

    <div class="tabs">
        <button class="tab active" id="btn-m" onclick="changeUser('malak')">ملك</button>
        <button class="tab" id="btn-h" onclick="changeUser('mohammed')">محمد</button>
    </div>

    <div id="app" class="container"></div>

    <div class="dock">
        <span onclick="location.reload()">🏠</span>
        <span onclick="alert('قريباً: تعديل المواعيد')">⚙️</span>
    </div>

<script>
    // تسجيل الخدمة لضمان زر التثبيت
    if ('serviceWorker' in navigator) {
        const sw = "self.addEventListener('fetch', ()=>{});";
        const blob = new Blob([sw], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    let user = 'malak';
    const data = {
        malak: [
            {n:"رياضة", d:6, s:14, e:16.5}, {n:"ألماني", d:6, s:16, e:18}, {n:"كيمياء", d:6, s:20.5, e:22.5},
            {n:"تاريخ", d:0, s:16, e:18}, {n:"عربي", d:0, s:19, e:21}, {n:"كورس", d:0, s:23, e:25},
            {n:"فيزياء", d:1, s:14, e:16}, {n:"إنجليزي", d:1, s:16, e:18}
        ],
        mohammed: [
            {n:"رياضة", d:6, s:10.5, e:13}, {n:"كيمياء", d:6, s:13, e:15}, {n:"ألماني", d:6, s:16, e:18}
        ]
    };

    function render() {
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const now = new Date(), d = now.getDay(), h = now.getHours() + now.getMinutes()/60;
        let html = '<div class="day-label">الجدول الدراسي</div>';

        const todayList = data[user].filter(x => x.d === d).sort((a,b)=>a.s-b.s);
        
        if(todayList.length === 0) {
            html += '<div class="card">استراحة اليوم ☕</div>';
        } else {
            todayList.forEach((item, i) => {
                // إضافة وقت الفراغ
                if(i === 0 && item.s > 9) html += `<div class="free-slot">☕ وقت فراغ حتى ${fmt(item.s)}</div>`;
                if(i > 0 && item.s > todayList[i-1].e) html += `<div class="free-slot">☕ وقت فراغ: ${fmt(todayList[i-1].e)} - ${fmt(item.s)}</div>`;
                
                const isLive = (h >= item.s && h < item.e);
                html += `
                    <div class="card ${isLive?'live':''}">
                        <div class="lamp"></div>
                        <div class="info">
                            <b>${item.n}</b>
                            <span>${fmt(item.s)} - ${fmt(item.e)}</span>
                        </div>
                    </div>`;
            });
        }
        document.getElementById('app').innerHTML = html;
    }

    function fmt(t) {
        let hr = Math.floor(t), min = (t%1==0)?'00':'30', m = hr>=12?'PM':'AM';
        return `${hr%12||12}:${min} ${m}`;
    }

    function changeUser(u) {
        user = u;
        document.body.className = u + '-theme';
        document.getElementById('btn-m').classList.toggle('active', u==='malak');
        document.getElementById('btn-h').classList.toggle('active', u==='mohammed');
        render();
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-US', {hour12:true});
        render();
    }, 1000);

    render();
</script>
</body>
</html>
