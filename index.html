<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Schedule - Final</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: right; }
        .day-title { color: #ff007a; border-right: 4px solid #ff007a; padding-right: 10px; margin: 20px 0 10px; font-size: 1.5rem; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        .time { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="day-title">يوم الأربعاء</div>
    <div class="card"><b>تاريخ</b><br><span class="time">4:00 PM - 6:00 PM</span></div>
    <div class="card"><b>عربي</b><br><span class="time">7:00 PM - 9:00 PM</span></div>
    <div class="card"><b>كورس</b><br><span class="time">11:00 PM - 1:00 AM</span></div>

    <div class="day-title">يوم الخميس (الجديد)</div>
    <div class="card" style="border-color: #00ff88;"><b>فيزيا (ملك) / رياضة (محمد)</b><br><span class="time">حسب جدولك المعتاد</span></div>
    <div class="card"><b>إنجليزي / إلماني</b><br><span class="time">بعد الحصة الأولى</span></div>
    <div class="card"><b>تحفيظ</b><br><span class="time">11:00 PM</span></div>

    <p style="text-align:center; color:gray; margin-top:50px;">لو لسه مش شايف الخميس، امسح الـ Shortcut القديم وافتح اللينك تاني.</p>
</body>
</html>
